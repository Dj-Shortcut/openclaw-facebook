# Fly.io deployment config for the public Messenger gateway.
# Deploy from the openclaw-facebook repository root.

app = "leaderbot-openclaw-gateway"
primary_region = "ams"

[build]
dockerfile = "deploy/fly-gateway/Dockerfile"

[env]
NODE_ENV = "production"
OPENCLAW_STATE_DIR = "/data"
OPENCLAW_CONFIG_PATH = "/data/openclaw.json"
OPENCLAW_WORKSPACE_DIR = "/data/workspace"
OPENCLAW_FACEBOOK_PLUGIN_PATH = "/app/node_modules/@dj-shortcut/facebook"
OPENCLAW_CODEX_PLUGIN_PATH = "/app/node_modules/@openclaw/codex"
OPENCLAW_FACEBOOK_DEFAULT_DM_POLICY = "pairing"
OPENCLAW_PUBLIC_GATEWAY_GUARD = "1"
OPENCLAW_ADMIN_HOSTS = "leaderbot-openclaw-gateway.fly.dev"
OPENCLAW_AGENT_MODEL = "openai/gpt-5.4-mini"
OPENCLAW_AGENT_THINKING_DEFAULT = "low"
LEADERBOT_IMAGE_GEN_URL = "https://leaderbot-fb-image-gen.fly.dev"
NODE_OPTIONS = "--max-old-space-size=1536"

[processes]
app = "node deploy/fly-gateway/bin/start-gateway.mjs --allow-unconfigured --port 3000 --bind lan"

[http_service]
internal_port = 3000
force_https = true
auto_stop_machines = false
auto_start_machines = true
min_machines_running = 1
processes = ["app"]

[[vm]]
size = "shared-cpu-4x"
memory = "4096"

[mounts]
source = "openclaw_data"
destination = "/data"
