name: Update OpenClaw
run-name: Update OpenClaw dependency check

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  update-openclaw:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Check latest OpenClaw version
        id: latest
        run: |
          latest_openclaw="$(npm view openclaw version)"
          latest_codex="$(npm view @openclaw/codex version)"
          if [ "$latest_openclaw" != "$latest_codex" ]; then
            echo "::error::openclaw ($latest_openclaw) and @openclaw/codex ($latest_codex) latest versions differ"
            exit 1
          fi
          current="$(node -p "require('./package.json').openclaw.build.openclawVersion")"
          echo "latest=$latest_openclaw" >> "$GITHUB_OUTPUT"
          echo "current=$current" >> "$GITHUB_OUTPUT"
          if [ "$current" = "$latest_openclaw" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Report no OpenClaw update
        if: steps.latest.outputs.changed == 'false'
        run: |
          {
            echo "## No OpenClaw update available"
            echo ""
            echo "- Current version: ${{ steps.latest.outputs.current }}"
            echo "- Latest version: ${{ steps.latest.outputs.latest }}"
            echo "- No pull request was opened because the repository is already current."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Update version references
        if: steps.latest.outputs.changed == 'true'
        env:
          OPENCLAW_VERSION: ${{ steps.latest.outputs.latest }}
        run: npm run openclaw:update -- "$OPENCLAW_VERSION"

      - name: Update lockfile
        if: steps.latest.outputs.changed == 'true'
        run: npm install --package-lock-only --ignore-scripts --prefer-online

      - name: Install dependencies
        if: steps.latest.outputs.changed == 'true'
        run: npm ci

      - name: Build
        if: steps.latest.outputs.changed == 'true'
        run: npm run build

      - name: Validate OpenClaw runtime contract
        if: steps.latest.outputs.changed == 'true'
        run: npm run openclaw:validate

      - name: Test
        if: steps.latest.outputs.changed == 'true'
        run: npm test

      - name: Dry-run npm pack
        if: steps.latest.outputs.changed == 'true'
        run: npm run pack:dry

      - name: Prepare pull request body
        if: steps.latest.outputs.changed == 'true'
        env:
          OPENCLAW_VERSION: ${{ steps.latest.outputs.latest }}
        run: |
          cat > /tmp/openclaw-update-pr-body.md <<EOF
          Automated OpenClaw update.

          - Updates package metadata, lockfile, manifest expectations, and Fly gateway build arg to ${OPENCLAW_VERSION}
          - Runs build, runtime-contract validation, tests, and pack dry-run
          - Follow docs/openclaw-update.md for review, deploy verification, ClawHub/npm release, and rollback
          EOF

      - name: Create pull request
        if: steps.latest.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          OPENCLAW_VERSION: ${{ steps.latest.outputs.latest }}
        run: |
          branch="chore/update-openclaw-${OPENCLAW_VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$branch"
          git add package.json package-lock.json manifest.test.ts deploy/fly-gateway/Dockerfile
          git commit -m "Update OpenClaw to ${OPENCLAW_VERSION}"
          git push --force-with-lease origin "$branch"
          is_pr_policy_denial() {
            local operation="$1"
            local error_output="$2"
            grep -qiE "Resource not accessible by integration|GraphQL.*${operation}|${operation}.*(forbidden|not authorized|permission)" <<<"$error_output"
          }

          if gh pr view "$branch" >/dev/null 2>&1; then
            if ! edit_err="$(gh pr edit "$branch" \
              --title "Update OpenClaw to ${OPENCLAW_VERSION}" \
              --body-file /tmp/openclaw-update-pr-body.md 2>&1)"; then
              if is_pr_policy_denial "updatePullRequest" "$edit_err"; then
                echo "::notice::Updated branch $branch, but GitHub token policy blocked PR editing. Open or update the PR manually."
              else
                echo "$edit_err" >&2
                exit 1
              fi
            fi
          elif ! create_err="$(gh pr create \
            --base main \
            --head "$branch" \
            --title "Update OpenClaw to ${OPENCLAW_VERSION}" \
            --body-file /tmp/openclaw-update-pr-body.md 2>&1)"; then
            if is_pr_policy_denial "createPullRequest" "$create_err"; then
              echo "::notice::Pushed $branch, but GitHub token policy blocked PR creation. Open the PR manually from the pushed branch."
            else
              echo "$create_err" >&2
              exit 1
            fi
          fi
        shell: bash
