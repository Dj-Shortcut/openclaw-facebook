name: Customer App CI

on:
  pull_request:
    paths:
      - "apps/customer-app/**"
      - ".github/workflows/customer-app-ci.yml"
  push:
    branches: [main]
    paths:
      - "apps/customer-app/**"
      - ".github/workflows/customer-app-ci.yml"

permissions:
  contents: read

jobs:
  web:
    name: Web client
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/customer-app

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.4.1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/customer-app/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run check

      - name: Build
        run: pnpm run build

  tauri:
    name: Tauri shell
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/customer-app

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux Tauri dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libappindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            wget

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.4.1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/customer-app/pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/customer-app/src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check Tauri shell
        working-directory: apps/customer-app/src-tauri
        run: cargo check --locked
