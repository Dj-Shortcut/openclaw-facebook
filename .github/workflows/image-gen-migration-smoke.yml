name: image-gen migration smoke

permissions:
  contents: read

on:
  pull_request:
    paths:
      - 'apps/image-gen/drizzle/**'
      - 'apps/image-gen/package.json'
      - 'apps/image-gen/pnpm-lock.yaml'
      - '.github/workflows/image-gen-migration-smoke.yml'
  workflow_dispatch:

jobs:
  migrate:
    name: Drizzle migration smoke
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: test_image_gen
        options: >-
          --health-cmd "mysqladmin ping -h127.0.0.1 -uroot -proot --silent"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 3306:3306

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: apps/image-gen/pnpm-lock.yaml

      - name: Install dependencies
        run: |
          corepack enable
          corepack pnpm --dir apps/image-gen install --frozen-lockfile

      - name: Run drizzle migrations
        working-directory: apps/image-gen
        env:
          DATABASE_URL: mysql://root:root@127.0.0.1:3306/test_image_gen
        run: |
          ./node_modules/.bin/drizzle-kit migrate

      - name: Verify dailyQuota composite index exists
        run: |
          mysql -h127.0.0.1 -uroot -proot test_image_gen -e "SHOW INDEX FROM dailyQuota WHERE Key_name = 'dailyQuota_userId_date_unique'" | tee index-check.out
          if ! grep -q 'dailyQuota_userId_date_unique' index-check.out; then
            echo 'Expected index dailyQuota_userId_date_unique missing';
            exit 1;
          fi
