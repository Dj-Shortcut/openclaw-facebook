name: Validate plugin package

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Validate required files
        run: |
          test -f README.md
          test -f openclaw.plugin.json
          test -f package.json
          test -f tsconfig.json
          test -f manifest.test.ts

      - name: Check forbidden files
        run: |
          test ! -d node_modules
          test ! -f .env

      - name: Secret smoke check
        run: |
          ! grep -RInE "sk-[A-Za-z0-9_-]{20,}|(OPENAI_API_KEY|META_ACCESS_TOKEN|APP_SECRET|CLIENT_SECRET)=.+[A-Za-z0-9]" . \
            --exclude-dir=.git \
            --exclude-dir=node_modules \
            --exclude-dir=.github \
            --exclude="*.example" \
            --exclude=".env.example"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Dry-run npm pack
        run: npm run pack:dry

      - name: Create npm tarball
        run: npm pack

      - name: Validate tarball contents
        run: |
          tarball="$(ls dj-shortcut-facebook-*.tgz | head -n 1)"
          test -n "$tarball"
          tar -tzf "$tarball" > /tmp/openclaw-facebook-tarball-files.txt
          grep -Fx "package/dist/index.js" /tmp/openclaw-facebook-tarball-files.txt
          grep -Fx "package/dist/setup-entry.js" /tmp/openclaw-facebook-tarball-files.txt
          grep -Fx "package/openclaw.plugin.json" /tmp/openclaw-facebook-tarball-files.txt
          grep -Fx "package/README.md" /tmp/openclaw-facebook-tarball-files.txt
          grep -Fx "package/docs/setup.md" /tmp/openclaw-facebook-tarball-files.txt
          grep -Fx "package/examples/channels.facebook.json5" /tmp/openclaw-facebook-tarball-files.txt
          grep -Fx "package/examples/public-leaderbot.json5" /tmp/openclaw-facebook-tarball-files.txt

      - name: Install tarball in isolated OpenClaw profile
        run: |
          tarball="$(ls dj-shortcut-facebook-*.tgz | head -n 1)"
          ./node_modules/.bin/openclaw --profile ci-facebook-plugin-test plugins install "./$tarball" --force
          ./node_modules/.bin/openclaw --profile ci-facebook-plugin-test plugins inspect facebook --json > /tmp/facebook-plugin-inspect.json
          ./node_modules/.bin/openclaw --profile ci-facebook-plugin-test channels list --all --json > /tmp/openclaw-channels.json
          node -e "const fs=require('node:fs'); const inspect=JSON.parse(fs.readFileSync('/tmp/facebook-plugin-inspect.json','utf8')); if (inspect.diagnostics?.length) throw new Error(JSON.stringify(inspect.diagnostics)); if (!inspect.plugin?.channelIds?.includes('facebook')) throw new Error('facebook channel not loaded from plugin'); const channels=JSON.parse(fs.readFileSync('/tmp/openclaw-channels.json','utf8')).chat ?? {}; if (!channels.facebook?.installed) throw new Error('facebook is not installed in channel catalog'); if (channels.messenger) throw new Error('messenger appeared as a separate channel');"
