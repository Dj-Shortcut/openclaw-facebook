name: Validate plugin package

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show root files
        run: ls -la

      - name: Validate required files
        run: |
          test -f README.md

      - name: Check for forbidden files
        run: |
          test ! -d node_modules
          test ! -f .env

      - name: Secret smoke check
        run: |
          ! grep -RInE "sk-[A-Za-z0-9_-]{20,}|OPENAI_API_KEY=|META_ACCESS_TOKEN=|APP_SECRET=|CLIENT_SECRET=" . \
            --exclude-dir=.git \
            --exclude-dir=node_modules

      - name: Build tarball smoke test
        run: |
          tar \
            --exclude=.git \
            --exclude=node_modules \
            --exclude=.env \
            -czf plugin-package.tar.gz .
          tar -tzf plugin-package.tar.gz | head -100
