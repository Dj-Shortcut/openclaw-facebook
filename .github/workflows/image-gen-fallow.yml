name: Image Gen Fallow

on:
  pull_request:
    paths:
      - "apps/image-gen/**"
      - ".fallowrc.json"
      - "package.json"
      - "scripts/normalize-fallow-report.mjs"
      - ".github/workflows/image-gen-fallow.yml"
  push:
    branches: [main]
    paths:
      - "apps/image-gen/**"
      - ".fallowrc.json"
      - "package.json"
      - "scripts/normalize-fallow-report.mjs"
      - ".github/workflows/image-gen-fallow.yml"
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: image-gen-fallow-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codebase-health:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/image-gen

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Fallow - Codebase Health
        uses: fallow-rs/fallow@v2.27.0
        with:
          version: 2.27.0
          fail-on-issues: false
          format: json

      - name: Generate repo-wide Fallow report
        working-directory: ${{ github.workspace }}
        run: npm run fallow:report

      - name: Generate repo-wide production Fallow report
        working-directory: ${{ github.workspace }}
        run: npm run fallow:report:production

      - name: Generate Fallow report
        run: npm run fallow:report

      - name: Generate image-gen production Fallow report
        run: npm run fallow:report:production

      - name: Build repo-wide maintainability badge
        if: (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        working-directory: ${{ github.workspace }}
        run: |
          node apps/image-gen/scripts/fallow-badge.mjs \
            .fallow/report.json \
            public/badges/fallow-maintainability.json \
            public/badges/fallow-metrics.json

      - name: Build repo-wide production maintainability badge
        if: (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        working-directory: ${{ github.workspace }}
        run: |
          node apps/image-gen/scripts/fallow-badge.mjs \
            .fallow/report-production.json \
            public/badges/fallow-production-maintainability.json \
            public/badges/fallow-production-metrics.json \
            "fallow production"

      - name: Build maintainability badge
        if: (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        run: |
          node scripts/fallow-badge.mjs \
            .fallow/report.json \
            public/badges/fallow-maintainability.json \
            public/badges/fallow-metrics.json

      - name: Commit badge update
        if: (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' && github.actor != 'github-actions[bot]'
        working-directory: ${{ github.workspace }}
        shell: bash
        run: |
          if git diff --quiet -- public/badges/fallow-maintainability.json public/badges/fallow-metrics.json public/badges/fallow-production-maintainability.json public/badges/fallow-production-metrics.json apps/image-gen/public/badges/fallow-maintainability.json apps/image-gen/public/badges/fallow-metrics.json; then
            echo "Badge files unchanged"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/badges/fallow-maintainability.json public/badges/fallow-metrics.json public/badges/fallow-production-maintainability.json public/badges/fallow-production-metrics.json apps/image-gen/public/badges/fallow-maintainability.json apps/image-gen/public/badges/fallow-metrics.json
          git commit -m "chore: update Fallow maintainability badges"
          git push

      - name: Enforce maintainability gate
        if: github.event_name != 'pull_request'
        run: |
          node scripts/check-fallow-gate.mjs .fallow/report.json

      - name: Summarize production-only report
        shell: bash
        run: |
          node -e "const fs=require('node:fs'); const report=JSON.parse(fs.readFileSync('.fallow/report-production.json','utf8')); const maintainability=Number(report.health?.summary?.average_maintainability ?? NaN); const issues=Number(report.check?.total_issues ?? report.total_issues ?? 0); console.log(JSON.stringify({ mode: 'production-informational', maintainability: Number.isFinite(maintainability) ? Number(maintainability.toFixed(1)) : null, issues }, null, 2));"
