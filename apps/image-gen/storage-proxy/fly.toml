# Deployed Fly app: leaderbot-storage-proxy
# Do not deploy this project to the separate empty app named "storage-proxy".
app = "leaderbot-storage-proxy"
primary_region = 'ams'

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
